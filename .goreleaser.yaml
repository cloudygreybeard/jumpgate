# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: jumpgate

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: jumpgate
    main: .
    binary: jumpgate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/cloudygreybeard/jumpgate/internal/version.Version={{.Version}}
      - -X github.com/cloudygreybeard/jumpgate/internal/version.Commit={{.Commit}}
      - -X github.com/cloudygreybeard/jumpgate/internal/version.Date={{.Date}}

archives:
  - id: jumpgate
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: cloudygreybeard
    name: jumpgate
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  extra_files:
    - glob: hack/install.sh
    - glob: hack/install.ps1
