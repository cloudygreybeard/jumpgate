name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    uses: cloudygreybeard/homebrew-tap/.github/workflows/release-homebrew-formula.yml@main
    with:
      package-name: jumpgate
      binary-name: jumpgate
      formula-class: Jumpgate
      formula-desc: "SSH relay access manager — multi-hop tunnels via ControlMaster and reverse forwarding"
      artifact-style: goreleaser
      private: false
    secrets:
      deploy-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
